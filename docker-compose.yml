version: "3.9"

services:
  # ── Backend API & WebSocket Server ──
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: matdata-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=8080
    volumes:
      - ./apps/backend/src:/app/src
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Next.js Frontend ──
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: matdata-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_BACKEND_URL=http://backend:8080
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
